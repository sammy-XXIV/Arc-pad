<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#010308">
<title>ArcPad \u2014 Token Launchpad</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
:root{
  --bg:#010308;--s1:#060c18;--s2:#0a1220;--s3:#0f1a2e;
  --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.09);--b3:rgba(255,255,255,0.15);
  --arc:#2dd4ff;--arc2:#0ea5e9;--arcd:rgba(45,212,255,0.07);
  --grn:#34d399;--grnd:rgba(52,211,153,0.07);
  --red:#f87171;--redd:rgba(248,113,113,0.07);
  --yel:#fbbf24;
  --tx:rgba(255,255,255,0.9);--tx2:rgba(255,255,255,0.45);--tx3:rgba(255,255,255,0.2);--tx4:rgba(255,255,255,0.08);
  --r:14px;--r2:10px;--r3:8px;
  --mono:'Geist Mono',monospace;--serif:'Instrument Serif',serif;--sans:'Geist',sans-serif;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);--spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 80% -5%,rgba(45,212,255,0.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 15% 100%,rgba(14,165,233,0.04) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--b1) 1px,transparent 1px),linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:60px 60px;mask-image:radial-gradient(ellipse 100% 80% at 50% 0%,black 30%,transparent 100%);}
.page{display:none;position:relative;z-index:1;}.page.active{display:block;}

/* NAV */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:8px;padding:0 14px;height:54px;
  background:rgba(1,3,8,0.92);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--b1);}
.logo{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:0.06em;color:var(--tx);cursor:pointer;user-select:none;transition:opacity 0.2s;flex-shrink:0;}
.logo:hover{opacity:0.65;}
.lmark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--arc2),var(--arc));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lmark svg{width:12px;height:12px;}
.npill{font-family:var(--mono);font-size:9px;color:var(--yel);letter-spacing:0.05em;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.16);border-radius:100px;padding:3px 8px;flex-shrink:0;}
.nav-sp{flex:1;}
.nb{font-family:var(--sans);font-size:12px;color:var(--tx2);background:transparent;border:none;padding:6px 10px;border-radius:var(--r3);cursor:pointer;transition:all 0.16s;white-space:nowrap;}
.nb:hover{color:var(--tx);background:var(--b1);}
.nlbtn{display:flex;align-items:center;padding:7px 13px;border-radius:var(--r3);font-family:var(--sans);font-weight:500;font-size:12px;cursor:pointer;border:1px solid var(--b2);background:var(--b1);color:var(--tx);transition:all 0.18s;white-space:nowrap;flex-shrink:0;}
.nlbtn:hover{background:var(--b2);}
.wbtn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r3);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.03em;background:var(--arc);color:#000;border:none;cursor:pointer;transition:all 0.2s var(--ease);white-space:nowrap;flex-shrink:0;}
.wbtn:hover{background:#67e8f9;box-shadow:0 0 20px rgba(45,212,255,0.4);}
.wbtn:active{transform:scale(0.97);}
.wbtn.on{background:transparent;color:var(--grn);border:1px solid rgba(52,211,153,0.3);}
.wind{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.wind.pulse{animation:pd 2s ease-in-out infinite;}
@keyframes pd{0%,100%{opacity:1;}50%{opacity:0.35;}}

/* RPC STATUS */
.rpcbanner{display:none;padding:7px 16px;background:rgba(248,113,113,0.06);border-bottom:1px solid rgba(248,113,113,0.15);font-family:var(--mono);font-size:10px;color:rgba(248,113,113,0.85);text-align:center;line-height:1.5;}
.rpcbanner.show{display:block;}
.rpcok{display:none;padding:5px 16px;background:rgba(52,211,153,0.04);border-bottom:1px solid rgba(52,211,153,0.1);font-family:var(--mono);font-size:9px;color:rgba(52,211,153,0.6);text-align:center;letter-spacing:0.05em;}
.rpcok.show{display:block;}

/* TICKER */
.ticker{overflow:hidden;padding:7px 0;border-bottom:1px solid var(--b1);background:rgba(255,255,255,0.012);}
.tw{display:flex;gap:40px;animation:tx 30s linear infinite;width:max-content;}
.tick{font-family:var(--mono);font-size:10px;color:var(--tx2);display:flex;gap:6px;white-space:nowrap;}
.tick .g{color:var(--grn);}.tick .r{color:var(--red);}
@keyframes tx{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* SEARCH */
.sbar{position:relative;z-index:2;max-width:600px;margin:0 auto;padding:18px 16px 0;}
.swrap{position:relative;}
.swrap svg.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;opacity:0.3;pointer-events:none;}
.sinput{width:100%;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r2);padding:11px 13px 11px 40px;font-family:var(--mono);font-size:13px;color:var(--tx);outline:none;transition:border-color 0.16s;-webkit-appearance:none;}
.sinput:focus{border-color:var(--arc);}
.sinput::placeholder{color:var(--tx3);}
.sres{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;display:none;z-index:100;box-shadow:0 16px 48px rgba(0,0,0,0.6);}
.sres.show{display:block;}
.sri{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;transition:background 0.12s;}
.sri:hover{background:var(--b1);}
.sri-img{width:34px;height:34px;border-radius:8px;object-fit:cover;background:var(--s3);border:1px solid var(--b1);flex-shrink:0;}
.sri-ph{width:34px;height:34px;border-radius:8px;background:var(--s3);border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sri-nm{font-size:13px;font-weight:500;}
.sri-ca{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:2px;}
.sr-empty{padding:18px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--tx3);}

/* HERO */
.hero{padding:38px 20px 28px;text-align:center;max-width:560px;margin:0 auto;}
.hlabel{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--arc);letter-spacing:0.1em;background:var(--arcd);border:1px solid rgba(45,212,255,0.14);border-radius:100px;padding:5px 13px;margin-bottom:16px;}
.hlabel span{width:5px;height:5px;border-radius:50%;background:var(--arc);animation:pd 1.8s ease-in-out infinite;}
.hero h1{font-family:var(--serif);font-size:clamp(40px,11vw,74px);font-weight:400;line-height:1.05;letter-spacing:-0.02em;margin-bottom:10px;}
.hero h1 em{font-style:italic;color:var(--arc);}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* STAT BAR */
.stbar{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);margin-bottom:20px;}
.stcl{padding:13px 16px;border-right:1px solid var(--b1);}
.stcl:last-child{border-right:none;}
.sl{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px;}
.sv{font-family:var(--mono);font-size:15px;color:var(--tx);}
.sv.g{color:var(--grn);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--r3);font-family:var(--sans);font-weight:500;font-size:14px;cursor:pointer;border:none;transition:all 0.2s var(--ease);user-select:none;}
.btn:active{transform:scale(0.97);}
.btn-arc{background:var(--arc);color:#000;}
.btn-arc:hover{background:#67e8f9;box-shadow:0 4px 20px rgba(45,212,255,0.28);}
.btn-ghost{background:var(--b1);color:var(--tx);border:1px solid var(--b2);}
.btn-ghost:hover{background:var(--b2);border-color:var(--b3);}
.btn-grn{background:var(--grn);color:#000;}
.btn-grn:hover{filter:brightness(1.08);box-shadow:0 4px 18px rgba(52,211,153,0.28);}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{filter:brightness(1.08);box-shadow:0 4px 18px rgba(248,113,113,0.28);}
.btn:disabled{opacity:0.32;cursor:not-allowed;transform:none!important;box-shadow:none!important;filter:none!important;}
.bfw{width:100%;}

/* LAYOUT */
.main{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 16px 80px;display:grid;grid-template-columns:1fr 336px;gap:16px;align-items:start;}
.sechdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sectit{font-family:var(--mono);font-size:10px;color:var(--tx2);letter-spacing:0.1em;text-transform:uppercase;}
.frow{display:flex;gap:4px;}
.fb{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid transparent;background:transparent;color:var(--tx3);cursor:pointer;transition:all 0.14s;}
.fb:hover{color:var(--tx2);background:var(--b1);}
.fb.on{color:var(--arc);background:var(--arcd);border-color:rgba(45,212,255,0.18);}

/* TOKEN GRID */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:15px;cursor:pointer;transition:all 0.22s var(--ease);position:relative;overflow:hidden;}
.tc::after{content:'';position:absolute;inset:0;border-radius:var(--r);background:linear-gradient(135deg,rgba(45,212,255,0.03),transparent);opacity:0;transition:opacity 0.22s;}
.tc:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,0.45);}
.tc:hover::after{opacity:1;}
.tc.sel{border-color:rgba(45,212,255,0.38);box-shadow:0 0 0 1px rgba(45,212,255,0.12),0 10px 36px rgba(0,0,0,0.45);}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.timg{width:40px;height:40px;border-radius:var(--r2);object-fit:cover;flex-shrink:0;background:var(--s3);border:1px solid var(--b1);}
.timgph{width:40px;height:40px;border-radius:var(--r2);background:linear-gradient(135deg,var(--s3),var(--s2));border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.timgph svg{width:16px;height:16px;opacity:0.25;}
.tbg{font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:100px;letter-spacing:0.06em;white-space:nowrap;}
.bn{background:rgba(251,191,36,0.07);color:var(--yel);border:1px solid rgba(251,191,36,0.18);}
.bh{background:rgba(248,113,113,0.07);color:var(--red);border:1px solid rgba(248,113,113,0.18);}
.bl{background:rgba(52,211,153,0.07);color:var(--grn);border:1px solid rgba(52,211,153,0.18);}
.tnm{font-size:14px;font-weight:500;margin-bottom:1px;}
.ttk{font-family:var(--mono);font-size:10px;color:var(--tx3);letter-spacing:0.06em;}
.tdesc{font-size:12px;color:var(--tx2);line-height:1.5;margin:7px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* CA ROW \u2014 always copyable, tap-friendly */
.tca{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:6px;letter-spacing:0.04em;display:flex;align-items:center;gap:0;flex-wrap:wrap;gap:4px;}
.ca-addr{color:var(--tx3);}
.ca-copy{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--arc);cursor:pointer;
  background:var(--arcd);border:1px solid rgba(45,212,255,0.18);
  border-radius:5px;padding:2px 7px;font-size:9px;
  transition:all 0.14s;user-select:none;-webkit-user-select:none;
  /* Always visible on mobile \u2014 no hover-only */
}
.ca-copy:active{background:rgba(45,212,255,0.18);transform:scale(0.95);}
.ca-share{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--tx3);cursor:pointer;
  background:var(--b1);border:1px solid var(--b2);
  border-radius:5px;padding:2px 7px;font-size:9px;
  transition:all 0.14s;user-select:none;-webkit-user-select:none;
}
.ca-share:active{background:var(--b2);transform:scale(0.95);}

.cstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.csl{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:0.08em;margin-bottom:2px;}
.csv{font-family:var(--mono);font-size:11px;color:var(--tx);}
.csv.g{color:var(--grn);}.csv.r{color:var(--red);}
.bwrap{margin-top:10px;}
.bhdr{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:0.06em;margin-bottom:5px;}
.btrack{height:2px;background:var(--b1);border-radius:100px;overflow:hidden;}
.bfill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--arc2),var(--arc));transition:width 0.5s var(--ease);}

/* SIDEBAR */
.sb{display:flex;flex-direction:column;gap:10px;}
.pnl{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;}
.ph{padding:11px 15px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.pt{font-family:var(--mono);font-size:10px;color:var(--tx2);letter-spacing:0.1em;text-transform:uppercase;}
.pb{padding:13px 15px;}
.ttabs{display:grid;grid-template-columns:1fr 1fr;}
.ttab{padding:11px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--tx3);border:none;background:transparent;cursor:pointer;transition:all 0.14s;border-bottom:1px solid var(--b1);}
.ttab.buy.on{color:var(--grn);background:var(--grnd);border-bottom:1px solid var(--grn);}
.ttab.sell.on{color:var(--red);background:var(--redd);border-bottom:1px solid var(--red);}
.tbody{padding:13px;}
.ttr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);background:var(--s2);border:1px solid var(--b1);margin-bottom:11px;}
.ttrimg{width:30px;height:30px;border-radius:7px;object-fit:cover;background:var(--s3);border:1px solid var(--b1);flex-shrink:0;}
.ttrph{width:30px;height:30px;border-radius:7px;background:var(--s3);border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ttrph svg{width:12px;height:12px;opacity:0.25;}
.ig{margin-bottom:11px;}
.il{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.mx{color:var(--arc);cursor:pointer;}
.ir{display:flex;align-items:center;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:9px 12px;gap:8px;transition:border-color 0.16s;}
.ir:focus-within{border-color:var(--arc);}
.ir input{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:14px;font-weight:300;color:var(--tx);-webkit-appearance:none;min-width:0;}
.ir input::placeholder{color:var(--tx4);}
.iu{font-family:var(--mono);font-size:10px;color:var(--tx3);white-space:nowrap;}
.qr{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.qb{font-family:var(--mono);font-size:10px;padding:4px 9px;border-radius:100px;border:1px solid var(--b2);background:transparent;color:var(--tx2);cursor:pointer;transition:all 0.12s;}
.qb:hover{border-color:var(--arc);color:var(--arc);background:var(--arcd);}
.tsum{background:var(--s2);border-radius:var(--r2);padding:10px 12px;margin-bottom:11px;border:1px solid var(--b1);}
.tsr{display:flex;justify-content:space-between;padding:3px 0;}
.tsr .l{font-size:12px;color:var(--tx2);}.tsr .v{font-family:var(--mono);font-size:12px;}
.tsr .v.g{color:var(--grn);}.tsr .v.r{color:var(--red);}
.lov{position:absolute;inset:0;z-index:10;border-radius:var(--r);background:rgba(1,3,8,0.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px;}
.lov .li{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--b2
